quarkus:
  datasource:
    db-kind: postgresql
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    jdbc:
      url: jdbc:postgresql://db:5432/${POSTGRES_DB:seatReservation}
      
  mailer:
    mock: false
    from: ${MAIL_FROM}
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    tls: ${MAIL_TLS}
    start-tls: ${MAIL_START_TLS}

  hibernate-orm:
    schema-management:
      strategy: update

jwt:
  cookie:
    secure: ${SSL_ENABLED:true} 
    
# CAP CAPTCHA Configuration
cap:
  # URL of the CAP server (used for token verification)
  api:
    url: http://cap:3000
  # CAP Site Key (same as in frontend)
  site:
    key: ${CAP_SITE_KEY:default_site_key}
  # CAP Secret Key (for server-side verification)
  secret:
    key: ${CAP_SECRET_KEY:default_secret_key}

email:  
  frontend-base-url: ${APP_URL} # Change in case provide frontend on different URL
  bcc-address: ${EMAIL_BCC_ADDRESS:} # Optional BCC address for event notifications to users (leave empty to disable)

smallrye:
  jwt:
    new-token:
      issuer: ${APP_URL}
    sign:
      key:
        location: /deployments/keys/privateKey.pem
mp:
  jwt:
    publickey:
      location: /deployments/keys/publicKey.pem
