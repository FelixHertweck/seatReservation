
registration:
  enabled: true

# Login rate limiting configuration
login:
  # Maximum number of failed login attempts before account lockout
  max-failed-attempts: 5
  # Duration in seconds for which account remains locked after max failed attempts
  lockout-duration-seconds: 300

# Redis-backed seat selection cart (soft-lock while a user has a seat selected
# but hasn't completed the reservation yet).
seatcart:
  ttl-seconds: 300

smallrye:
  jwt:
    token:
      expiration:
        minutes: 3
    refreshtoken:
        expiration:
            days: 7
    always-check-authorization: true
    new-token:
      issuer: http://localhost:8080
    sign:
      key:
        location: keys/privateKey.pem
mp:
  jwt:
    token:
      header: Cookie
      cookie: jwt
    verify:
        publickey:
            location: keys/publicKey.pem

exporter:
    pdf:
        minutesBeforeEventStart: 10

email:  
  frontend-base-url: http://localhost:8080
  verification:
    expiration:
      minutes: 30

  seatmap:
    token:
      expiration:
        days: 30

  # Transactional email outbox / queue settings.
  # Mails are persisted first and delivered asynchronously by a background dispatcher,
  # which retries failed sends with exponential back-off before giving up (dead letter).
  queue:
    poll-interval: 30s # How often the dispatcher drains the queue
    batch-size: 20 # Max number of mails handled per drain cycle
    max-attempts: 5 # Delivery attempts before a mail becomes a FAILED dead letter
    retry-backoff-seconds: 60 # Base back-off; doubles per attempt (60s, 120s, 240s, ...)
    max-backoff-seconds: 3600 # Upper bound for the back-off delay
    sending-timeout-seconds: 300 # After this, a mail stuck in SENDING is requeued
    retention-days: 30 # How long delivered/failed mails are kept before cleanup

  # Optional BCC address for event notifications to users (leave empty to disable)
  bcc-address: ""
 
  # Template for entrance information text
  entrance-info-template: "Please use entrance {entrance} for seats {seats}"

  # Optional external directory holding email template overrides (leave empty to use the
  # bundled templates). Files there mirror the bundled layout, e.g.
  # <dir>/email/reservation-confirmation.html, and are picked up on application start.
  template:
    override-dir: ""

  header:
    confirmation: "Please Confirm Your Email Address"
    password-changed: "Your Password Has Been Changed"
    reservation-confirmation: "Your Reservation Confirmation"
    reservation-update: "Your Reservation Update"
    reminder: "Reminder: Your event is starting soon!"
    reservation-overview: "Reservation overview for your event:"
    