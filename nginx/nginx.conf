events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # ============================================
    # SECURITY: Rate Limiting Zones
    # ============================================
    
    # Zone für Login-Endpoint (5 req/s per IP)
    # Zone Name: login_limit
    # Memory: 10MB (stores ~160,000 IP addresses)
    # Rate: 5 requests per second per IP
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/s;
    
    # Zone für allgemeine API (20 req/s per IP)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

    # This is required to proxy Grafana Live WebSocket connections.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;
        server_name localhost;

        # ============================================
        # CAP CAPTCHA Integration
        # ============================================
        
        # Proxy CAP CAPTCHA widget API requests
        location ~ ^/cap/(.*)$ {
            proxy_pass http://cap:3000/$1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ============================================
        # SECURITY: Strict Rate Limiting for Login
        # ============================================
        
        # Protect POST /api/auth/login with strict rate limiting
        # - Burst: 10 requests allowed
        # - Nodelay: return 429 immediately (don't queue)
        # - Zone: login_limit (5 req/s per IP)
        location = /api/auth/login {
            limit_req zone=login_limit burst=10 nodelay;
            limit_req_status 429;
            
            proxy_pass http://backend:8080;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Protect POST /api/auth/register with rate limiting
        location = /api/auth/register {
            limit_req zone=api_limit burst=5 nodelay;
            limit_req_status 429;
            
            proxy_pass http://backend:8080;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # General API endpoints with moderate rate limiting
        location ~ ^/(api|q)/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;
            
            proxy_pass http://backend:8080;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy for grafana
        location /grafana/ {
            rewrite  ^/grafana/(.*)  /$1 break;
            proxy_pass http://grafana:3000/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy Grafana Live WebSocket connections.
        location /grafana/api/live/ {
            rewrite  ^/grafana/(.*)  /$1 break;
            proxy_pass http://grafana:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
        }

        # Proxy legal notice
        #location ~ ^/.*/legal-notice$ {
        #    return 301 http://target-legal-notice;
        #}

        # Proxy for privacy policy
        #location ~ ^/.*/privacy$ {
        #    return 301 http://target-privacy;
        #}

        # Proxy for frontend (Next.js)
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}