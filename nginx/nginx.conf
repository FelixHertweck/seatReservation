load_module modules/ngx_http_coraza_module.so;

events {
    worker_connections 1024;
}

http {
    # Initialize Coraza WAF
    coraza_directives "
        Include @owasp_crs/crs-setup.conf.example
        Include @owasp_crs/rules/*.conf
        SecRuleEngine On
        SecDefaultAction \"phase:1,log,auditlog,deny,status:403\"
        SecDefaultAction \"phase:2,log,auditlog,deny,status:403\"
    ";

    include mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # This is required to proxy Grafana Live WebSocket connections.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Rate limiting zone for login endpoints
    # - 10m memory zone (can store ~160,000 IP addresses)
    # - 5r/m limits normal requests to 5 per minute per IP to prevent brute-forcing
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    server {
        listen 80;
        server_name localhost;

        # Enable Coraza WAF for this virtual host
        coraza on;

        # Strict rate limit for login and register endpoints to prevent brute-force attacks
        location /api/auth/login {
            # Apply rate limiting
            # - burst=5: allow up to 5 excess requests to be queued (good for occasional rapid clicks)
            # - nodelay: process the burst immediately without adding artificial delay
            limit_req zone=login_limit burst=5 nodelay;

            proxy_pass http://backend:8080;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy for backend
        location ~ ^/(api|q)/ {
            proxy_pass http://backend:8080;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy for grafana
        location /grafana/ {
            rewrite  ^/grafana/(.*)  /$1 break;
            proxy_pass http://grafana:3000/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy Grafana Live WebSocket connections.
        location /grafana/api/live/ {
            rewrite  ^/grafana/(.*)  /$1 break;
            proxy_pass http://grafana:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
        }

        # Proxy legal notice
        #location ~ ^/.*/legal-notice$ {
        #    return 301 http://target-legal-notice;
        #}

        # Proxy for privacy policy
        #location ~ ^/.*/privacy$ {
        #    return 301 http://target-privacy;
        #}

        # Proxy for frontend (Next.js)
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}