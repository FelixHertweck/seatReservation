name: Daily Image Cleanup
on:
  push:
    branches: [ "main" ]
    paths-ignore: [ "**/*.md" ]
    tags:
      - "v*.*"
      - "v*.*.*"
  workflow_dispatch:
permissions:
  contents: read
  packages: write
  # Write permissions to packages are required for the GHCR cleanup action
jobs:
  delete-untagged-packages:
    name: Delete Untagged Package Versions
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Frontend delete untagged versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'seatreservation-frontend'
          package-type: 'container'
          min-versions-to-keep: 5
          delete-only-untagged-versions: 'true'
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Backend delete untagged versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'seatreservation-backend'
          package-type: 'container'
          min-versions-to-keep: 5
          delete-only-untagged-versions: 'true'
          token: ${{ secrets.GITHUB_TOKEN }}
